<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice — Socia Visual</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<style>
  @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-700.woff2') format('woff2'); font-weight: 700; font-display: swap; }
  @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-600.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Share Tech Mono'; src: url('fonts/share-tech-mono.woff2') format('woff2'); font-weight: 400; font-display: swap; }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Chakra Petch', sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .action-bar {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .action-bar .ab-btn {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #333;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    letter-spacing: .5px;
  }

  .action-bar .ab-btn:hover { border-color: #333; }

  .action-bar .ab-btn-primary {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }

  .action-bar .ab-btn-primary:hover { background: #333; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 13px;
    background: #fff3dc;
    color: #b8860b;
    border: 1px solid #ffb428;
    margin-left: 8px;
  }

  .status-pill.paid { background: #e8f5e9; color: #2e7d32; border-color: #4caf50; }
  .status-pill.overdue { background: #ffe5e5; color: #c62828; border-color: #c62828; }

  .action-bar .ab-btn-pay {
    background: #48b8d0;
    color: #fff;
    border-color: #48b8d0;
    font-weight: 700;
  }
  .action-bar .ab-btn-pay:hover { background: #3ba5bd; border-color: #3ba5bd; }

  .pay-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
  }
  .pay-modal-backdrop.open { display: flex; }

  .pay-modal {
    background: #fff;
    border-radius: 6px;
    width: 100%;
    max-width: 480px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    position: relative;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
  }

  .pay-modal-close {
    position: absolute;
    top: 12px; right: 12px;
    background: transparent;
    border: none;
    font-size: 24px;
    color: #999;
    cursor: pointer;
    padding: 4px 10px;
    line-height: 1;
  }
  .pay-modal-close:hover { color: #333; }

  .pay-modal h2 {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 4px;
    color: #1a1a1a;
  }

  .pay-modal .pay-invoice-ref {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .pay-modal .pay-amount {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: #48b8d0;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid #eee;
  }

  #payment-element { margin-bottom: 20px; }

  .pay-submit-btn {
    width: 100%;
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 14px;
    border-radius: 4px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .5px;
  }
  .pay-submit-btn:hover:not(:disabled) { background: #333; }
  .pay-submit-btn:disabled { opacity: .6; cursor: not-allowed; }

  .pay-error {
    color: #c62828;
    font-size: 13px;
    margin-bottom: 14px;
    min-height: 18px;
  }

  .pay-note {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin-top: 14px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: .5px;
  }

  .pay-success {
    text-align: center;
    padding: 20px 0;
  }
  .pay-success .check {
    width: 64px; height: 64px;
    background: #e8f5e9;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    color: #2e7d32;
  }
  .pay-success h2 { color: #2e7d32; margin-bottom: 12px; }
  .pay-success p { color: #666; font-size: 14px; line-height: 1.5; }

  .invoice-page {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .invoice-wrap {
    background: #fff;
    width: 100%;
    max-width: 800px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .invoice-header {
    background: linear-gradient(135deg, #7dd3c0, #5bc4d4, #48b8d0);
    padding: 48px 56px 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .invoice-header h1 {
    font-size: 42px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
  }

  .header-logo svg { width: 160px; height: auto; }

  .invoice-body { padding: 40px 56px 56px; }

  .meta-row {
    display: flex;
    gap: 120px;
    margin-bottom: 36px;
  }

  .meta-col label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    display: block;
    margin-bottom: 4px;
  }

  .meta-col span { font-size: 16px; font-weight: 600; color: #1a1a1a; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 4px;
    display: inline-block;
  }

  .from-block, .to-block { margin-bottom: 28px; }
  .from-block p, .to-block p { font-size: 15px; line-height: 1.6; color: #1a1a1a; }
  .to-block .client-email { font-size: 13px; color: #666; margin-top: 2px; }

  .period { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #1a1a1a; }

  .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  .invoice-table thead th { font-size: 14px; font-weight: 600; padding: 10px 12px; border-bottom: 2px solid #1a1a1a; text-align: left; color: #1a1a1a; }
  .invoice-table thead th:nth-child(3), .invoice-table thead th:nth-child(4) { text-align: right; }
  .invoice-table tbody td { font-size: 14px; padding: 12px; border: 1px solid #ddd; color: #333; }
  .invoice-table tbody td:nth-child(3), .invoice-table tbody td:nth-child(4) { text-align: right; }
  .invoice-table tbody td:first-child { width: 80px; text-align: center; }

  .total-row { display: flex; justify-content: flex-end; margin-bottom: 40px; }
  .total-row table { border-collapse: collapse; }
  .total-row td { padding: 8px 12px; font-size: 14px; font-weight: 700; border: 1px solid #ddd; }
  .total-row td:last-child { text-align: right; min-width: 100px; }

  .payment-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #1a1a1a; }
  .payment-section p { font-size: 14px; line-height: 1.8; color: #333; }
  .payment-section strong { font-weight: 700; color: #1a1a1a; }

  .timesheet-cta { margin: 28px 0 32px; display: flex; justify-content: center; }
  .timesheet-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: #1a1a1a;
    color: #fff;
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border: 2px solid #1a1a1a;
    transition: all 0.15s ease;
  }
  .timesheet-btn:hover { background: #48b8d0; border-color: #48b8d0; color: #1a1a1a; }
  .timesheet-btn svg { display: block; }
  @media print { .timesheet-cta { display: none; } }

  .not-found { text-align: center; padding: 100px 40px; font-size: 18px; color: #999; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1a1a;
    color: #fff;
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    padding: 12px 20px;
    border-radius: 6px;
    z-index: 2000;
    opacity: 0;
    transform: translateY(10px);
    transition: all .25s ease;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    .action-bar { flex-wrap: wrap; padding: 12px 16px; gap: 10px; }
    .invoice-header { padding: 32px 28px; }
    .invoice-header h1 { font-size: 28px; }
    .header-logo svg { width: 110px; }
    .invoice-body { padding: 28px; }
    .meta-row { gap: 40px; flex-wrap: wrap; }
    .invoice-page { padding: 20px 12px; }
  }

  @media print {
    .action-bar { display: none; }
    body { background: #fff; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .invoice-page { padding: 0; }
    .invoice-wrap { box-shadow: none; max-width: 100%; }
    .invoice-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="action-bar" id="actionBar" style="display:none;">
  <button class="ab-btn ab-btn-pay" id="payBtn" onclick="openPayModal()" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
    Pay This Invoice
  </button>
  <button class="ab-btn ab-btn-primary" onclick="downloadPDF()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </button>
  <span class="status-pill" id="statusPill">Unpaid</span>
</div>

<div class="pay-modal-backdrop" id="payModal" onclick="if(event.target===this)closePayModal()">
  <div class="pay-modal">
    <button class="pay-modal-close" onclick="closePayModal()" aria-label="Close">&times;</button>
    <div id="payFormView">
      <h2>Pay Invoice</h2>
      <div class="pay-invoice-ref" id="payInvoiceRef"></div>
      <div class="pay-amount" id="payAmount">$0.00</div>
      <div id="payment-element"></div>
      <div class="pay-error" id="payError"></div>
      <button class="pay-submit-btn" id="paySubmit" onclick="submitPayment()">Pay Now</button>
      <div class="pay-note">Secured by Stripe · Card &amp; ACH accepted</div>
    </div>
    <div id="paySuccessView" style="display:none;">
      <div class="pay-success">
        <div class="check">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2 id="paySuccessTitle">Payment Received</h2>
        <p id="paySuccessBody">Thank you — a receipt has been sent to your email.</p>
      </div>
    </div>
  </div>
</div>

<div class="invoice-page">
  <div class="invoice-wrap" id="invoiceView">
    <div class="not-found" id="notFound">
      <p>Loading invoice...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STRIPE_PUBLISHABLE_KEY = 'pk_test_51TOKIuQ5CJ2Q3cPET446RwjFnzj03oLZutAtI78nQogE6Ul2LlxtTTTPMCO26gNzCcpnWK3Gfn5YytmxrUaw4dFt00MoHgwOaR';
const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);

let currentInvoice = null;
let invoiceToken = null;
let elements = null;
let paymentElement = null;

function showError(msg) {
  document.getElementById('notFound').innerHTML = `<p>${msg}</p>`;
}

(async function() {
  const params = new URLSearchParams(window.location.search);
  const invoiceId = params.get('id');
  const token = params.get('t');
  invoiceToken = token;

  if (!invoiceId || !token) {
    showError('This invoice link is invalid or has expired. Please contact scott@sociavisual.com for a new link.');
    return;
  }

  let resp;
  try {
    resp = await fetch(`/api/get-invoice?id=${encodeURIComponent(invoiceId)}&t=${encodeURIComponent(token)}`);
  } catch {
    showError('Unable to load invoice. Please try again in a moment.');
    return;
  }

  if (resp.status === 403) {
    showError('This invoice link is invalid or has expired. Please contact scott@sociavisual.com for a new link.');
    return;
  }
  if (resp.status === 404) {
    showError('Invoice not found.');
    return;
  }
  if (!resp.ok) {
    showError('Unable to load invoice. Please try again in a moment.');
    return;
  }

  const { invoice: data } = await resp.json();

  const invoice = {
    id: data.id,
    number: data.number,
    date: data.date ? new Date(data.date + 'T00:00:00').toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'}) : '',
    rawDate: data.date,
    status: data.status,
    companyName: data.company_name,
    clientName: data.client_name,
    clientEmail: data.client_email,
    period: data.period,
    items: data.items || [],
    notes: data.notes
  };

  currentInvoice = invoice;
  document.title = `Invoice #${invoice.number} — Socia Visual`;

  document.getElementById('actionBar').style.display = 'flex';

  const pill = document.getElementById('statusPill');
  const payBtn = document.getElementById('payBtn');
  if (invoice.status === 'paid') {
    pill.textContent = 'Paid';
    pill.className = 'status-pill paid';
  } else if (invoice.status === 'overdue') {
    pill.textContent = 'Overdue';
    pill.className = 'status-pill overdue';
    payBtn.style.display = 'inline-flex';
  } else {
    pill.textContent = 'Unpaid';
    pill.className = 'status-pill';
    payBtn.style.display = 'inline-flex';
  }

  renderInvoice(invoice);
})();

function renderInvoice(invoice) {
  const formatCurrency = (n) => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

  let itemsHTML = '';
  let total = 0;
  (invoice.items || []).forEach(item => {
    const lineTotal = item.qty * item.price;
    total += lineTotal;
    itemsHTML += `<tr>
      <td>${item.qty}</td>
      <td>${item.description}</td>
      <td>${formatCurrency(item.price)}</td>
      <td>${formatCurrency(lineTotal)}</td>
    </tr>`;
  });

  // Extract an optional timesheet link from notes and render it as a button.
  // Any remaining notes content is dropped — notes section no longer renders.
  let timesheetBtnHTML = '';
  if (invoice.notes) {
    const m = invoice.notes.match(/https?:\/\/[^\s"'<>]+\/billing\/[^\s"'<>]+timesheet[^\s"'<>]*\.html/i);
    if (m) {
      timesheetBtnHTML = `<div class="timesheet-cta">
        <a href="${m[0]}" class="timesheet-btn" target="_blank" rel="noopener">
          <span>View Timesheet</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>`;
    }
  }

  let clientBlock = invoice.companyName || invoice.clientName || '';
  if (invoice.companyName && invoice.clientName) {
    clientBlock = `${invoice.companyName}<br>${invoice.clientName}`;
  }

  let emailLine = '';
  if (invoice.clientEmail) {
    emailLine = `<div class="client-email">${invoice.clientEmail}</div>`;
  }

  document.getElementById('invoiceView').innerHTML = `
    <div class="invoice-header">
      <h1>INVOICE</h1>
      <div class="header-logo">
        <img src="data:image/svg+xml,%3Csvg viewBox='0 0 2098.6 515.2' xmlns='http://www.w3.org/2000/svg' fill='%231a1a1a' stroke='none'%3E%3Cpolygon points='633.2 164 567 236.2 546.5 258.5 480.3 330.8 100.9 330.8 167.1 258.5 452.9 258.5 473.4 236.2 187.6 236.2 253.8 164 633.2 164'/%3E%3Cg%3E%3Cpolygon points='1059 69.5 992.8 141.7 907.3 234.9 813.7 234.9 899.2 141.7 274.3 141.7 340.5 69.5 1059 69.5'/%3E%3Cpolygon points='735.7 258.5 1190.5 258.5 1124.3 330.8 505.5 330.8 658.4 164 752.1 164 665.4 258.5 735.7 258.5'/%3E%3Cpolygon points='1997.7 330.8 1562 330.8 1628.2 258.6 1837.9 258.6 1731.9 143 1707.6 143 1535.4 330.8 1146.8 330.8 1213 258.6 1279.3 258.6 1386.4 141.7 1111.7 141.7 1026.3 234.9 932.6 234.9 1084.3 69.5 1658.7 69.5 1592.4 141.7 1480.1 141.7 1478.9 143 1372.9 258.6 1508 258.6 1681.4 69.5 1758.1 69.5 1997.7 330.8'/%3E%3C/g%3E%3Cg%3E%3Cpath d='M100.9,382.6h35.7l1.9,29.1,25.6-29.1h45.7l-61.1,63.8h-40.7l-7.1-63.8Z'/%3E%3Cpath d='M495,446.4h-41.2l27-63.8h41.2l-27,63.8Z'/%3E%3Cpath d='M767.2,446.4l5.5-12.9h47.7c.3,0,.5-.3.8-.8l.4-1.1c0-.1,0-.3,0-.5l-32.2-21.7c-.8-.6-1.4-1.3-1.7-2.2s-.5-2-.5-3.2c0-2,.3-4.2,1-6.5.7-2.3,1.4-4.3,2.2-5.9l1.7-3.9c.6-1.4,1.5-2.6,2.8-3.5,1.3-1,2.6-1.5,3.9-1.5h94l-5.5,12.9h-54.9c-.7,0-1.2.5-1.6,1.6-.1,1,0,1.6.4,1.6l38.3,26.1c.8.6,1.4,1.3,1.7,2.2s.5,1.9.5,3c0,1.6-.3,3.1-1,4.6l-3.2,7.7c-1.2,2.8-3.2,4.3-5.9,4.3h-94.7Z'/%3E%3Cpath d='M1245.9,446.4h-97.3c-1.7,0-3.1-.4-4.1-1.2-1-.8-1.7-1.8-2.1-2.9-.4-1.1-.5-2.4-.4-3.7.1-1.4.4-2.6.9-3.8l22.1-52.1h41.2l-20.6,48.6c-.2.6-.3,1.1-.2,1.6.1.5.5.7,1.1.7h23.3l21.6-50.9h41.3l-27,63.8Z'/%3E%3Cpath d='M1626,446.4h-41.3l9.3-21.8h-25.3l-9.3,21.8h-41.2l22-52c.5-1.1,1.3-2.4,2.3-3.7,1-1.4,2.2-2.7,3.6-3.8,1.4-1.2,2.9-2.2,4.6-3,1.7-.8,3.4-1.2,5.1-1.2h97.3l-27,63.8ZM1574,411.7h25.3l6.9-16.2h-23.3c-.7,0-1.2.2-1.7.7-.5.5-.9,1-1.2,1.6l-5.9,13.9Z'/%3E%3Cpath d='M1898.1,446.4l27-63.8h41.2l-21.6,50.9h52.9l-5.5,12.9h-94.1Z'/%3E%3C/g%3E%3Cpolyline points='642.7 141 368 141 282.6 234.2 187.6 236.2 340.6 68.8 610.3 68.8'/%3E%3C/svg%3E" alt="Socia Visual" style="width:160px;height:auto;">
      </div>
    </div>

    <div class="invoice-body">
      <div class="meta-row">
        <div class="meta-col">
          <label>Date</label>
          <span>${invoice.date}</span>
        </div>
        <div class="meta-col">
          <label>Invoice No</label>
          <span>${invoice.number}</span>
        </div>
      </div>

      <div class="from-block">
        <div class="section-label">Invoice From:</div>
        <p>Scott Socia<br>903-617-1527<br>scott@sociavisual.com</p>
      </div>

      <div class="to-block">
        <div class="section-label">Invoice To:</div>
        <p>${clientBlock}</p>
        ${emailLine}
      </div>

      <div class="period">${invoice.period || ''}</div>

      <table class="invoice-table">
        <thead>
          <tr><th>Quantity</th><th>Description</th><th>Unit Price</th><th>Line Total</th></tr>
        </thead>
        <tbody>${itemsHTML}</tbody>
      </table>

      <div class="total-row">
        <table>
          <tr><td><strong>Total</strong></td><td><strong>${formatCurrency(total)}</strong></td></tr>
        </table>
      </div>

      ${timesheetBtnHTML}

      <div class="payment-section">
        <h3>Electronic Payment Info:</h3>
        <p>
          <strong>ACH:</strong> Routing – 041215663 / Account – 2079194039345<br>
          <strong>CashApp:</strong> $sociavisual<br>
          <strong>Venmo:</strong> @socia739<br>
          <strong>PayPal:</strong> paypal.me/sociavis
        </p>
      </div>
    </div>
  `;
}

function downloadPDF() {
  if (!currentInvoice) return;
  const el = document.getElementById('invoiceView');
  const filename = `Socia_Invoice_${currentInvoice.number}.pdf`;

  html2pdf().set({
    margin: 0,
    filename: filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, scrollY: -window.scrollY },
    jsPDF: { unit: 'px', format: [800, el.scrollHeight], hotfixes: ['px_scaling'] }
  }).from(el).save().then(() => {
    toast('PDF downloaded');
  });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ═══ PAYMENT FLOW ═══
function invoiceTotalCents() {
  if (!currentInvoice) return 0;
  let cents = 0;
  for (const item of (currentInvoice.items || [])) {
    cents += Math.round((Number(item.qty) || 0) * (Number(item.price) || 0) * 100);
  }
  return cents;
}

function formatCents(cents) {
  return '$' + (cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function openPayModal() {
  if (!currentInvoice) return;
  const cents = invoiceTotalCents();
  if (cents < 50) { toast('Invoice amount too small'); return; }

  document.getElementById('payInvoiceRef').textContent = `Invoice #${currentInvoice.number}`;
  document.getElementById('payAmount').textContent = formatCents(cents);
  document.getElementById('payFormView').style.display = 'block';
  document.getElementById('paySuccessView').style.display = 'none';
  document.getElementById('payError').textContent = '';
  document.getElementById('payModal').classList.add('open');

  if (paymentElement) return; // already mounted

  let data;
  try {
    const resp = await fetch('/api/stripe/create-payment-intent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invoice_id: currentInvoice.id, token: invoiceToken })
    });
    data = await resp.json();
    if (!resp.ok) throw new Error(data.error || `Server error ${resp.status}`);
  } catch (err) {
    document.getElementById('payError').textContent = err.message || 'Unable to start payment';
    return;
  }

  elements = stripe.elements({
    clientSecret: data.client_secret,
    appearance: {
      theme: 'stripe',
      variables: {
        colorPrimary: '#48b8d0',
        fontFamily: 'Chakra Petch, sans-serif',
        borderRadius: '4px'
      }
    }
  });

  paymentElement = elements.create('payment', {
    layout: { type: 'tabs', defaultCollapsed: false }
  });
  paymentElement.mount('#payment-element');
}

function closePayModal() {
  document.getElementById('payModal').classList.remove('open');
}

async function submitPayment() {
  if (!elements) return;
  const submitBtn = document.getElementById('paySubmit');
  const errEl = document.getElementById('payError');
  submitBtn.disabled = true;
  submitBtn.textContent = 'Processing…';
  errEl.textContent = '';

  const { error, paymentIntent } = await stripe.confirmPayment({
    elements,
    redirect: 'if_required',
    confirmParams: {
      return_url: window.location.href
    }
  });

  if (error) {
    errEl.textContent = error.message || 'Payment failed';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Pay Now';
    return;
  }

  showPaymentResult(paymentIntent);
}

function showPaymentResult(pi) {
  const titleEl = document.getElementById('paySuccessTitle');
  const bodyEl = document.getElementById('paySuccessBody');
  const pill = document.getElementById('statusPill');

  if (pi.status === 'succeeded') {
    titleEl.textContent = 'Payment Received';
    bodyEl.textContent = 'Thank you — a receipt has been emailed. You can close this tab.';
    pill.textContent = 'Paid';
    pill.className = 'status-pill paid';
    document.getElementById('payBtn').style.display = 'none';
  } else if (pi.status === 'processing') {
    titleEl.textContent = 'Payment Processing';
    bodyEl.textContent = 'Your payment is on the way. ACH transfers take 3–5 business days to clear. You\u2019ll get a receipt by email once it settles.';
    pill.textContent = 'Processing';
    pill.className = 'status-pill';
  } else {
    titleEl.textContent = 'Check Your Email';
    bodyEl.textContent = 'Stripe needs one more step to complete payment. Check the email from Stripe to finish.';
  }

  document.getElementById('payFormView').style.display = 'none';
  document.getElementById('paySuccessView').style.display = 'block';
}

// Handle return from 3DS / bank redirect
(async function handleReturn() {
  const params = new URLSearchParams(window.location.search);
  const clientSecret = params.get('payment_intent_client_secret');
  if (!clientSecret) return;

  const { paymentIntent } = await stripe.retrievePaymentIntent(clientSecret);
  if (paymentIntent) {
    document.getElementById('payModal').classList.add('open');
    showPaymentResult(paymentIntent);
    // Clean up query params so reloads don't re-trigger
    const cleanUrl = window.location.pathname + '?id=' + params.get('id') + (params.get('t') ? '&t=' + params.get('t') : '');
    window.history.replaceState({}, '', cleanUrl);
  }
})();
</script>
