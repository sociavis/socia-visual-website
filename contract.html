<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contract — Socia Visual</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-700.woff2') format('woff2'); font-weight: 700; font-display: swap; }
  @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-600.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Chakra Petch'; src: url('fonts/chakra-petch-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Share Tech Mono'; src: url('fonts/share-tech-mono.woff2') format('woff2'); font-weight: 400; font-display: swap; }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Chakra Petch', sans-serif;
    background: #f5f5f5;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .action-bar {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .action-bar .ab-btn {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #333;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    letter-spacing: .5px;
  }

  .action-bar .ab-btn:hover { border-color: #333; }

  .action-bar .ab-btn-primary {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }

  .action-bar .ab-btn-primary:hover { background: #333; }

  .status-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 5px 14px;
    border-radius: 20px;
    font-weight: 400;
  }
  .status-badge.draft { background: #eee; color: #888; }
  .status-badge.sent { background: #fff3e0; color: #e65100; }
  .status-badge.signed { background: #e8f5e9; color: #2e7d32; }
  .status-badge.expired { background: #fce4ec; color: #c62828; }

  .contract-page {
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }

  .contract-wrap {
    background: #fff;
    width: 100%;
    max-width: 800px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .contract-header {
    background: linear-gradient(135deg, #1a1a1a, #2a2a2a, #333);
    padding: 48px 56px 40px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .contract-header h1 {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
  }
  .contract-header .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,.5);
    letter-spacing: 2px;
    margin-top: 6px;
  }

  .header-logo svg { width: 160px; height: auto; }

  .contract-body { padding: 40px 56px 56px; }

  .meta-row {
    display: flex;
    gap: 60px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .meta-col label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    display: block;
    margin-bottom: 4px;
  }

  .meta-col span { font-size: 16px; font-weight: 600; color: #1a1a1a; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 4px;
    display: inline-block;
  }

  .party-block { margin-bottom: 28px; }
  .party-block p { font-size: 15px; line-height: 1.6; color: #1a1a1a; }
  .party-block .client-email { font-size: 13px; color: #666; margin-top: 2px; }

  .contract-section {
    margin-bottom: 32px;
  }
  .contract-section h2 {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #1a1a1a;
  }
  .contract-section h3 {
    font-size: 15px;
    font-weight: 700;
    color: #333;
    margin: 16px 0 8px;
  }
  .contract-section p, .contract-section li {
    font-size: 14px;
    line-height: 1.8;
    color: #333;
  }
  .contract-section ul, .contract-section ol {
    padding-left: 24px;
    margin: 8px 0;
  }
  .contract-section li {
    margin-bottom: 4px;
  }

  .deliverables-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  .deliverables-table th {
    font-size: 13px; font-weight: 600; padding: 10px 12px;
    border-bottom: 2px solid #1a1a1a; text-align: left; color: #1a1a1a;
  }
  .deliverables-table td {
    font-size: 14px; padding: 12px; border: 1px solid #ddd; color: #333;
  }

  .total-row { display: flex; justify-content: flex-end; margin: 16px 0 32px; }
  .total-row table { border-collapse: collapse; }
  .total-row td { padding: 8px 12px; font-size: 14px; font-weight: 700; border: 1px solid #ddd; }
  .total-row td:last-child { text-align: right; min-width: 120px; }

  .signature-block {
    display: flex;
    gap: 60px;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid #ddd;
  }
  .sig-party { flex: 1; }
  .sig-party h4 {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: #888; margin-bottom: 40px;
  }
  .sig-line {
    border-top: 1px solid #1a1a1a;
    padding-top: 8px;
    margin-bottom: 20px;
  }
  .sig-line .sig-label {
    font-size: 12px; color: #888; font-family: 'Share Tech Mono', monospace;
  }
  .sig-line .sig-value {
    font-size: 14px; font-weight: 600; color: #1a1a1a; min-height: 20px;
  }

  .not-found { text-align: center; padding: 100px 40px; font-size: 18px; color: #999; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1a1a;
    color: #fff;
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    padding: 12px 20px;
    border-radius: 6px;
    z-index: 2000;
    opacity: 0;
    transform: translateY(10px);
    transition: all .25s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 640px) {
    .action-bar { flex-wrap: wrap; padding: 12px 16px; gap: 10px; }
    .contract-header { padding: 32px 28px; flex-wrap: wrap; gap: 16px; }
    .contract-header h1 { font-size: 24px; }
    .header-logo svg { width: 110px; }
    .contract-body { padding: 28px; }
    .meta-row { gap: 24px; }
    .contract-page { padding: 20px 12px; }
    .signature-block { flex-direction: column; gap: 32px; }
  }

  @media print {
    .action-bar { display: none; }
    body { background: #fff; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .contract-page { padding: 0; }
    .contract-wrap { box-shadow: none; max-width: 100%; }
    .contract-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .contract-section { break-inside: avoid; }
    .signature-block { break-inside: avoid; }
  }
</style>
</head>
<body>

<div class="action-bar" id="actionBar" style="display:none;">
  <button class="ab-btn ab-btn-primary" onclick="downloadPDF()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </button>
  <span class="status-badge" id="statusBadge"></span>
</div>

<div class="contract-page">
  <div class="contract-wrap" id="contractView">
    <div class="not-found" id="notFound">
      <p>Loading contract...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://yjmyqmfvtudhkkxarttw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqbXlxbWZ2dHVkaGtreGFydHR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzAxMjQsImV4cCI6MjA5MDE0NjEyNH0.kOctH25mfqGAqnd3OCMmGiLto2TuSPt8IoFpKdjn-So';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentContract = null;

(async function() {
  const params = new URLSearchParams(window.location.search);
  const contractId = params.get('id');
  if (!contractId) {
    document.getElementById('notFound').innerHTML = '<p>Contract not found.</p>';
    return;
  }

  const { data, error } = await sb.from('contracts').select('*').eq('id', contractId).single();

  if (error || !data) {
    document.getElementById('notFound').innerHTML = '<p>Contract not found.</p>';
    return;
  }

  currentContract = {
    id: data.id,
    number: data.number,
    title: data.title,
    date: data.date ? new Date(data.date + 'T00:00:00').toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'}) : '',
    status: data.status,
    companyName: data.company_name,
    clientName: data.client_name,
    clientEmail: data.client_email,
    scope: data.scope,
    deliverables: data.deliverables || [],
    timeline: data.timeline,
    paymentTotal: data.payment_total,
    paymentTerms: data.payment_terms,
    terms: data.terms,
    startDate: data.start_date ? new Date(data.start_date + 'T00:00:00').toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'}) : '',
    endDate: data.end_date ? new Date(data.end_date + 'T00:00:00').toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'}) : '',
    proposalUrl: data.proposal_url,
    notes: data.notes
  };

  document.title = `Contract #${currentContract.number} — Socia Visual`;
  document.getElementById('actionBar').style.display = 'flex';

  const badge = document.getElementById('statusBadge');
  badge.textContent = currentContract.status;
  badge.className = 'status-badge ' + (currentContract.status || 'draft');

  renderContract(currentContract);
})();

function renderContract(c) {
  const formatCurrency = (n) => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

  let deliverablesHTML = '';
  let total = 0;
  if (c.deliverables && c.deliverables.length) {
    // Check if deliverables have rate/type fields (hourly model) vs just price (fixed model)
    const isHourly = c.deliverables.some(d => d.rate || d.type);
    if (isHourly) {
      let rows = c.deliverables.map(d => {
        return `<tr>
          <td><strong>${d.type || ''}</strong></td>
          <td style="text-align:right;font-size:18px;font-weight:700;">${d.rate ? '$' + d.rate : ''}<span style="font-size:13px;font-weight:400;color:#666;"> / hour</span></td>
          <td>${d.description || ''}</td>
        </tr>`;
      }).join('');
      deliverablesHTML = `
        <table class="deliverables-table">
          <thead><tr><th>Rate Tier</th><th style="text-align:right;">Rate</th><th>Description</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    } else {
      let rows = c.deliverables.map(d => {
        total += d.price || 0;
        return `<tr>
          <td>${d.description}</td>
          <td style="text-align:right;">${formatCurrency(d.price || 0)}</td>
        </tr>`;
      }).join('');
      deliverablesHTML = `
        <table class="deliverables-table">
          <thead><tr><th>Deliverable</th><th style="text-align:right;">Price</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="total-row">
          <table>
            <tr><td><strong>Total Contract Value</strong></td><td><strong>${formatCurrency(c.paymentTotal || total)}</strong></td></tr>
          </table>
        </div>`;
    }
  }

  let clientBlock = c.companyName || c.clientName || '';
  if (c.companyName && c.clientName) {
    clientBlock = `${c.companyName}<br>${c.clientName}`;
  }
  let emailLine = c.clientEmail ? `<div class="client-email">${c.clientEmail}</div>` : '';

  let proposalHTML = '';
  if (c.proposalUrl) {
    proposalHTML = `<div class="contract-section" style="margin-bottom:24px;">
      <p style="font-size:14px;"><strong>Related Proposal:</strong> <a href="${c.proposalUrl}" target="_blank" style="color:#48b8d0;text-decoration:none;border-bottom:1px solid #48b8d0;">${c.proposalUrl}</a></p>
    </div>`;
  }

  let scopeHTML = '';
  if (c.scope) {
    scopeHTML = `<div class="contract-section">
      <h2>1. Scope of Work</h2>
      <p>${c.scope.replace(/\n/g, '<br>')}</p>
    </div>`;
  }

  let delSection = '';
  if (deliverablesHTML) {
    delSection = `<div class="contract-section">
      <h2>2. Deliverables & Pricing</h2>
      ${deliverablesHTML}
    </div>`;
  }

  let timelineHTML = '';
  if (c.timeline) {
    timelineHTML = `<div class="contract-section">
      <h2>3. Timeline</h2>
      <p>${c.timeline.replace(/\n/g, '<br>')}</p>
      ${c.startDate || c.endDate ? `<p style="margin-top:8px;"><strong>Start Date:</strong> ${c.startDate || 'TBD'} &nbsp;&mdash;&nbsp; <strong>End Date:</strong> ${c.endDate || 'TBD'}</p>` : ''}
    </div>`;
  }

  let paymentHTML = '';
  if (c.paymentTerms) {
    paymentHTML = `<div class="contract-section">
      <h2>4. Payment Terms</h2>
      <p>${c.paymentTerms.replace(/\n/g, '<br>')}</p>
      <div style="margin-top:16px;">
        <h3>Electronic Payment Info:</h3>
        <p>
          <strong>ACH:</strong> Routing – 041215663 / Account – 2079194039345<br>
          <strong>CashApp:</strong> $sociavisual<br>
          <strong>Venmo:</strong> @socia739<br>
          <strong>PayPal:</strong> paypal.me/sociavis
        </p>
      </div>
    </div>`;
  }

  let termsHTML = '';
  if (c.terms) {
    termsHTML = `<div class="contract-section">
      <h2>5. Terms & Conditions</h2>
      <p>${c.terms.replace(/\n/g, '<br>')}</p>
    </div>`;
  }

  let notesHTML = '';
  if (c.notes) {
    notesHTML = `<div class="contract-section" style="border-top:1px solid #eee;padding-top:24px;">
      <h3 style="font-size:14px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Notes</h3>
      <p>${c.notes.replace(/\n/g, '<br>')}</p>
    </div>`;
  }

  document.getElementById('contractView').innerHTML = `
    <div class="contract-header">
      <div>
        <h1>SERVICE AGREEMENT</h1>
        <div class="header-sub">${c.title || 'Contract #' + c.number}</div>
      </div>
      <div class="header-logo">
        <svg viewBox="0 0 2098.6 515.2" xmlns="http://www.w3.org/2000/svg" fill="#ffffff" stroke="none">
          <polygon points="633.2 164 567 236.2 546.5 258.5 480.3 330.8 100.9 330.8 167.1 258.5 452.9 258.5 473.4 236.2 187.6 236.2 253.8 164 633.2 164"/>
          <g>
            <polygon points="1059 69.5 992.8 141.7 907.3 234.9 813.7 234.9 899.2 141.7 274.3 141.7 340.5 69.5 1059 69.5"/>
            <polygon points="735.7 258.5 1190.5 258.5 1124.3 330.8 505.5 330.8 658.4 164 752.1 164 665.4 258.5 735.7 258.5"/>
            <polygon points="1997.7 330.8 1562 330.8 1628.2 258.6 1837.9 258.6 1731.9 143 1707.6 143 1535.4 330.8 1146.8 330.8 1213 258.6 1279.3 258.6 1386.4 141.7 1111.7 141.7 1026.3 234.9 932.6 234.9 1084.3 69.5 1658.7 69.5 1592.4 141.7 1480.1 141.7 1478.9 143 1372.9 258.6 1508 258.6 1681.4 69.5 1758.1 69.5 1997.7 330.8"/>
          </g>
          <g>
            <path d="M100.9,382.6h35.7l1.9,29.1,25.6-29.1h45.7l-61.1,63.8h-40.7l-7.1-63.8Z"/>
            <path d="M495,446.4h-41.2l27-63.8h41.2l-27,63.8Z"/>
            <path d="M767.2,446.4l5.5-12.9h47.7c.3,0,.5-.3.8-.8l.4-1.1c0-.1,0-.3,0-.5l-32.2-21.7c-.8-.6-1.4-1.3-1.7-2.2s-.5-2-.5-3.2c0-2,.3-4.2,1-6.5.7-2.3,1.4-4.3,2.2-5.9l1.7-3.9c.6-1.4,1.5-2.6,2.8-3.5,1.3-1,2.6-1.5,3.9-1.5h94l-5.5,12.9h-54.9c-.7,0-1.2.5-1.6,1.6-.1,1,0,1.6.4,1.6l38.3,26.1c.8.6,1.4,1.3,1.7,2.2s.5,1.9.5,3c0,1.6-.3,3.1-1,4.6l-3.2,7.7c-1.2,2.8-3.2,4.3-5.9,4.3h-94.7Z"/>
            <path d="M1245.9,446.4h-97.3c-1.7,0-3.1-.4-4.1-1.2-1-.8-1.7-1.8-2.1-2.9-.4-1.1-.5-2.4-.4-3.7.1-1.4.4-2.6.9-3.8l22.1-52.1h41.2l-20.6,48.6c-.2.6-.3,1.1-.2,1.6.1.5.5.7,1.1.7h23.3l21.6-50.9h41.3l-27,63.8Z"/>
            <path d="M1626,446.4h-41.3l9.3-21.8h-25.3l-9.3,21.8h-41.2l22-52c.5-1.1,1.3-2.4,2.3-3.7,1-1.4,2.2-2.7,3.6-3.8,1.4-1.2,2.9-2.2,4.6-3,1.7-.8,3.4-1.2,5.1-1.2h97.3l-27,63.8ZM1574,411.7h25.3l6.9-16.2h-23.3c-.7,0-1.2.2-1.7.7-.5.5-.9,1-1.2,1.6l-5.9,13.9Z"/>
            <path d="M1898.1,446.4l27-63.8h41.2l-21.6,50.9h52.9l-5.5,12.9h-94.1Z"/>
          </g>
          <polyline points="642.7 141 368 141 282.6 234.2 187.6 236.2 340.6 68.8 610.3 68.8"/>
        </svg>
      </div>
    </div>

    <div class="contract-body">
      <div class="meta-row">
        <div class="meta-col">
          <label>Contract No</label>
          <span>${c.number}</span>
        </div>
        <div class="meta-col">
          <label>Date</label>
          <span>${c.date}</span>
        </div>
        <div class="meta-col">
          <label>Status</label>
          <span style="text-transform:capitalize;">${c.status || 'Draft'}</span>
        </div>
      </div>

      <div class="party-block">
        <div class="section-label">Service Provider:</div>
        <p>Phillip Scott Socia<br>DBA Socia Visual<br>910 Hamilton Park Dr Unit A<br>Whitehouse, TX 75791</p>
      </div>

      <div class="party-block">
        <div class="section-label">Client:</div>
        <p>${clientBlock}</p>
        ${emailLine}
      </div>

      ${proposalHTML}
      ${scopeHTML}
      ${delSection}
      ${timelineHTML}
      ${paymentHTML}
      ${termsHTML}
      ${notesHTML}

      <div class="signature-block">
        <div class="sig-party">
          <h4>Service Provider</h4>
          <div class="sig-line">
            <div class="sig-label">Signature</div>
          </div>
          <div class="sig-line">
            <div class="sig-value">Phillip Scott Socia</div>
            <div class="sig-label">Printed Name</div>
          </div>
          <div class="sig-line">
            <div class="sig-label">Date</div>
          </div>
        </div>
        <div class="sig-party">
          <h4>Client</h4>
          <div class="sig-line">
            <div class="sig-label">Signature</div>
          </div>
          <div class="sig-line">
            <div class="sig-value">${c.clientName || ''}</div>
            <div class="sig-label">Printed Name</div>
          </div>
          <div class="sig-line">
            <div class="sig-label">Date</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function downloadPDF() {
  if (!currentContract) return;
  window.print();
  toast('Print dialog opened — save as PDF');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
</body>
</html>
