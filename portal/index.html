<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal — Socia Visual</title>
<meta name="robots" content="noindex, nofollow">
<style>
  @font-face { font-family: 'Chakra Petch'; src: url('../fonts/chakra-petch-700.woff2') format('woff2'); font-weight: 700; font-display: swap; }
  @font-face { font-family: 'Chakra Petch'; src: url('../fonts/chakra-petch-600.woff2') format('woff2'); font-weight: 600; font-display: swap; }
  @font-face { font-family: 'Chakra Petch'; src: url('../fonts/chakra-petch-400.woff2') format('woff2'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Share Tech Mono'; src: url('../fonts/share-tech-mono.woff2') format('woff2'); font-weight: 400; font-display: swap; }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050505;
    --surface: #0a0a0a;
    --surface-2: #111;
    --surface-3: #1a1a1a;
    --border: #222;
    --border-light: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #777;
    --text-muted: #555;
    --accent: #a8ff00;
    --accent-2: #d4ff00;
    --accent-dim: rgba(168,255,0,.1);
    --green: #4caf50;
    --yellow: #ffb428;
    --red: #ff4444;
    --font: 'Chakra Petch', sans-serif;
    --mono: 'Share Tech Mono', monospace;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

  /* ═══ AUTH ═══ */
  .auth-gate {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; flex-direction: column; gap: 24px;
  }
  .auth-gate.hidden { display: none; }
  .auth-logo svg { width: 180px; height: auto; margin-bottom: 8px; }
  .auth-gate h1 { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-dim); font-family: var(--mono); }
  .auth-input-wrap { display: flex; gap: 8px; }
  .auth-input-wrap input {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 16px; padding: 12px 20px; border-radius: 6px;
    width: 280px; outline: none; transition: border-color .2s;
  }
  .auth-input-wrap input:focus { border-color: var(--accent); }
  .auth-input-wrap button {
    background: var(--accent); color: #050505; border: none; font-family: var(--font);
    font-weight: 700; font-size: 14px; padding: 12px 28px; border-radius: 6px;
    cursor: pointer; letter-spacing: 1px; transition: background .2s;
  }
  .auth-input-wrap button:hover { background: var(--accent-2); }
  .auth-error { color: var(--red); font-size: 13px; font-family: var(--mono); min-height: 18px; }

  /* ═══ APP ═══ */
  .app { display: none; height: 100vh; }
  .app.visible { display: flex; }

  /* Sidebar */
  .sidebar {
    width: 240px; min-width: 240px; background: var(--surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh;
  }
  .sidebar-brand { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-brand svg { width: 110px; height: auto; }
  .sidebar-brand .brand-sub { font-size: 10px; font-family: var(--mono); color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }

  .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
  .nav-section-label { font-size: 10px; font-family: var(--mono); color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; padding: 12px 12px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 6px;
    cursor: pointer; transition: all .15s; font-size: 13px; font-weight: 500;
    color: var(--text-dim); border: 1px solid transparent; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(168,255,0,.15); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge { margin-left: auto; font-size: 10px; font-family: var(--mono); background: var(--surface-3); color: var(--text-dim); padding: 2px 7px; border-radius: 10px; min-width: 22px; text-align: center; }
  .nav-item.active .nav-badge { background: rgba(168,255,0,.15); color: var(--accent); }

  .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .sidebar-footer .user-name { font-size: 12px; font-family: var(--mono); color: var(--text-dim); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-footer button { background: none; border: none; color: var(--text-muted); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: color .15s; letter-spacing: 1px; }
  .sidebar-footer button:hover { color: var(--red); }

  /* Main */
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid var(--border); background: var(--surface); min-height: 52px; }
  .topbar-title { font-size: 16px; font-weight: 700; letter-spacing: .5px; }
  .page-area { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .page { display: none; }
  .page.active { display: block; }
  #page-projects.active { display: flex; }

  /* ═══ DASHBOARD ═══ */
  .welcome { padding: 28px 28px 0; }
  .welcome h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .welcome p { font-size: 13px; color: var(--text-dim); }

  .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding: 20px 28px; }
  .stat-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 20px 22px; transition: border-color .2s; }
  .stat-card:hover { border-color: var(--border-light); }
  .stat-card .stat-label { font-size: 10px; font-family: var(--mono); color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
  .stat-card .stat-value.accent { color: var(--accent); }
  .stat-card .stat-value.green { color: var(--green); }
  .stat-card .stat-value.yellow { color: var(--yellow); }
  .stat-card .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 5px; font-family: var(--mono); }

  .section-heading { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); padding: 8px 28px 12px; }

  .data-table { width: calc(100% - 56px); margin: 0 28px 28px; border-collapse: collapse; background: var(--surface-2); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .data-table th { font-size: 10px; font-family: var(--mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  .data-table td { font-size: 13px; padding: 11px 16px; border-bottom: 1px solid var(--border); color: var(--text-dim); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface-3); }
  .data-table .mono { font-family: var(--mono); }
  .data-table .accent { color: var(--accent); }
  .data-table tr { cursor: pointer; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; font-family: var(--mono); letter-spacing: .5px; text-transform: uppercase; }
  .badge-paid { background: rgba(76,175,80,.15); color: var(--green); }
  .badge-unpaid { background: rgba(255,180,40,.15); color: var(--yellow); }
  .badge-overdue { background: rgba(255,68,68,.15); color: var(--red); }
  .badge-signed { background: rgba(76,175,80,.15); color: var(--green); }
  .badge-draft { background: rgba(255,255,255,.06); color: var(--text-muted); }
  .badge-sent { background: rgba(255,180,40,.15); color: var(--yellow); }

  /* ═══ LIST PAGES ═══ */
  .list-page { padding: 24px 28px; }
  .list-card {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px 20px; margin-bottom: 8px; cursor: pointer; transition: all .15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .list-card:hover { border-color: var(--border-light); background: var(--surface-3); }
  .list-card-left { display: flex; flex-direction: column; gap: 3px; }
  .list-card-title { font-size: 14px; font-weight: 600; }
  .list-card-title .num { font-family: var(--mono); color: var(--accent); margin-right: 8px; }
  .list-card-sub { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
  .list-card-right { display: flex; align-items: center; gap: 14px; }
  .list-card-amount { font-family: var(--mono); font-size: 15px; font-weight: 700; }

  /* ═══ PROPOSAL PAGE ═══ */
  .proposal-card {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 32px; margin: 24px 28px; max-width: 500px;
  }
  .proposal-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .proposal-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
  .proposal-card .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent); color: #050505; border: none; font-family: var(--font);
    font-weight: 700; font-size: 13px; padding: 10px 22px; border-radius: 5px;
    cursor: pointer; letter-spacing: .5px; transition: background .2s; text-decoration: none;
  }
  .proposal-card .btn:hover { background: var(--accent-2); }

  .empty-state { padding: 60px 28px; text-align: center; color: var(--text-muted); font-size: 13px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface-3); border: 1px solid var(--accent); color: var(--text); font-family: var(--font); font-size: 13px; padding: 12px 20px; border-radius: 6px; z-index: 2000; opacity: 0; transform: translateY(10px); transition: all .25s ease; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 900px) {
    .sidebar { width: 56px; min-width: 56px; }
    .sidebar-brand .brand-sub, .nav-item span, .nav-badge, .sidebar-footer .user-name { display: none; }
    .sidebar-brand { padding: 16px; text-align: center; }
    .sidebar-brand svg { width: 24px; }
    .nav-item { justify-content: center; padding: 10px; }
  }

  @media (max-width: 700px) {
    .dash-grid { grid-template-columns: repeat(2, 1fr); padding: 16px; }
    .data-table { width: calc(100% - 32px); margin: 0 16px 16px; }
    .list-page { padding: 16px; }
    .list-card { flex-direction: column; align-items: flex-start; gap: 8px; }
    .list-card-right { width: 100%; justify-content: space-between; }
  }
</style>
</head>
<body>

<!-- Auth -->
<div class="auth-gate" id="authGate">
  <div class="auth-logo">
    <svg viewBox="0 0 2098.6 515.2" xmlns="http://www.w3.org/2000/svg" fill="#a8ff00" stroke="none">
      <polygon points="633.2 164 567 236.2 546.5 258.5 480.3 330.8 100.9 330.8 167.1 258.5 452.9 258.5 473.4 236.2 187.6 236.2 253.8 164 633.2 164"/>

      <polyline points="642.7 141 368 141 282.6 234.2 187.6 236.2 340.6 68.8 610.3 68.8"/>
    </svg>
  </div>
  <h1>Client Portal</h1>
  <div class="auth-input-wrap">
    <input type="password" id="authPass" placeholder="Password" autofocus>
    <button onclick="authenticate()">Enter</button>
  </div>
  <div class="auth-error" id="authError"></div>
</div>

<!-- App -->
<div class="app" id="app">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 1920 1920" xmlns="http://www.w3.org/2000/svg" fill="#a8ff00" stroke="none">
        <polygon points="1454.6 882 625.1 882 469.2 1035.9 1298.7 1035.9 1454.6 882"/>
        <polygon points="331.3 960.5 959.1 332.7 1188.3 562 1406.8 562 1179.6 334.8 958.6 113.7 114.4 959 428.2 1275.9 1055.4 1275.9 1211.3 1122.1 492.9 1122.1 331.3 960.5"/>
        <polygon points="1493 648.1 862.1 648.1 706.2 802 1428.4 802 1586.9 960.5 959.1 1588.3 849.7 1478.9 732.9 1362.1 514.4 1362.1 739.7 1587.4 958.6 1806.3 1805.6 960.7 1493 648.1"/>
      </svg>
      <div class="brand-sub">Client Portal</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </div>

      <div class="nav-section-label">Documents</div>
      <div class="nav-item" onclick="navigate('invoices')" data-page="invoices">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Invoices</span>
        <span class="nav-badge" id="invCount">0</span>
      </div>
      <div class="nav-item" onclick="navigate('contracts')" data-page="contracts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Contracts</span>
        <span class="nav-badge" id="conCount">0</span>
      </div>
      <div class="nav-item" onclick="navigate('projects')" data-page="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        <span>Projects</span>
        <span class="nav-badge" id="projCount">0</span>
      </div>
      <div class="nav-item" onclick="navigate('proposal')" data-page="proposal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
        <span>Proposal</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <span class="user-name" id="footerName"></span>
      <button onclick="logout()">LOGOUT</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Dashboard</div>
    </div>

    <div class="page-area">

      <!-- Dashboard -->
      <div class="page active" id="page-dashboard">
        <div class="welcome" id="welcome"></div>
        <div class="dash-grid" id="dashStats"></div>
        <div class="section-heading">Recent Invoices</div>
        <table class="data-table" id="recentTable">
          <thead><tr><th>Invoice</th><th>Period</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody id="recentBody"></tbody>
        </table>
        <div class="section-heading">Contracts</div>
        <table class="data-table" id="conTable">
          <thead><tr><th>Contract</th><th>Title</th><th>Status</th></tr></thead>
          <tbody id="conBody"></tbody>
        </table>
      </div>

      <!-- Invoices -->
      <div class="page" id="page-invoices">
        <div class="list-page" id="invListPage"></div>
      </div>

      <!-- Contracts -->
      <div class="page" id="page-contracts">
        <div class="list-page" id="conListPage"></div>
      </div>

      <!-- Projects -->
      <div class="page" id="page-projects" style="height:100%;flex-direction:column;">
        <div id="projSelectorBar" style="display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;">
          <select id="projSelector" onchange="onProjectSelect()" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 12px;border-radius:5px;outline:none;flex:1;max-width:300px;">
            <option value="">Select a project...</option>
          </select>
          <button onclick="showNewClientProject()" style="background:var(--accent);color:#050505;border:none;font-family:var(--font);font-weight:700;font-size:12px;padding:8px 16px;border-radius:5px;cursor:pointer;white-space:nowrap;">+ New Project</button>
        </div>
        <div id="newProjFormWrap"></div>
        <div id="projLoading" class="empty-state">Select or create a project to get started.</div>
        <div id="clientFeedLayout" style="display:none;flex:1;flex-direction:row;overflow:hidden;">
          <div class="client-feed-main" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
            <div class="proj-feed-hdr" style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border);">
              <span id="clientProjName" style="font-size:15px;font-weight:700;"></span>
              <span id="clientProjStatus" style="font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:1px;background:var(--accent-dim);padding:3px 10px;border-radius:10px;text-transform:uppercase;"></span>
            </div>
            <div id="clientFeedStream" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:16px;"></div>
            <div id="clientStagedFiles" style="padding:0 16px;display:flex;flex-wrap:wrap;gap:6px;"></div>
            <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;">
              <input type="file" id="clientFileInput" style="display:none" multiple>
              <button class="ab-btn" style="padding:6px 10px;font-size:12px;border-color:var(--border);background:none;color:var(--text-dim);" onclick="document.getElementById('clientFileInput').click()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.49"/></svg>
              </button>

async function authenticate() {
  const btn = document.querySelector('.auth-input-wrap button');
  const pass = document.getElementById('authPass').value;
  if (!pass) return;

  btn.textContent = '...';
  const { data, error } = await sb.from('partners').select('*').eq('portal_password', pass).eq('status', 'active').single();
  btn.textContent = 'Enter';

  if (error || !data) {
    document.getElementById('authError').textContent = 'Invalid password';
    document.getElementById('authPass').value = '';
    return;
  }

  currentClient = data;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ id: data.id, company_name: data.company_name, contact_name: data.contact_name, proposal_url: data.proposal_url }));
  document.getElementById('authGate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  init();
}

document.getElementById('authPass').addEventListener('keydown', e => { if (e.key === 'Enter') authenticate(); });

function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }

} else {

}

async function init() {
  document.getElementById('footerName').textContent = currentClient.company_name || '';

  await Promise.all([loadInvoices(), loadContracts(), loadClientProjects()]);

// ═══ NAV ═══
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const target = document.getElementById('page-' + page);
  const nav = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (target) target.classList.add('active');
  if (nav) nav.classList.add('active');
  const titles = { dashboard: 'Dashboard', invoices: 'Invoices', contracts: 'Contracts', projects: 'Projects', proposal: 'Proposal' };
  document.getElementById('pageTitle').textContent = titles[page] || page;
  window.location.hash = page;
}

// ═══ DASHBOARD ═══
function renderDashboard() {
  const name = currentClient.contact_name || currentClient.company_name || 'there';
  document.getElementById('welcome').innerHTML = `<h2>Welcome, ${name}</h2><p>Here's an overview of your account with Socia Visual.</p>`;

  const activeProjCount = clientProjects.length;

  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Billed</div><div class="stat-value accent">${fmt(totalBilled)}</div><div class="stat-sub">${invoices.length} invoice${invoices.length !== 1 ? 's' : ''}</div></div>
    <div class="stat-card"><div class="stat-label">Paid</div><div class="stat-value green">${fmt(paidTotal)}</div><div class="stat-sub">${paid.length} paid</div></div>
    <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-value yellow">${fmt(unpaidTotal)}</div><div class="stat-sub">${unpaid.length} remaining</div></div>
    <div class="stat-card"><div class="stat-label">Active Projects</div><div class="stat-value">${activeProjCount}</div></div>

  // Recent invoices

// ═══ PROJECTS ═══
let clientProjects = [];
let activeClientProject = null;
let clientFeed = [];
let clientTasks = [];
let clientPendingFiles = [];
let clientProjChannel = null;

async function loadClientProjects() {
  const { data } = await sb.from('projects').select('*').eq('partner_id', currentClient.id).eq('status', 'active').order('created_at', { ascending: false });
  clientProjects = data || [];
  document.getElementById('projCount').textContent = clientProjects.length;

  // Populate selector
  const sel = document.getElementById('projSelector');
  sel.innerHTML = '<option value="">Select a project...</option>' + clientProjects.map(p =>
    `<option value="${p.id}" ${activeClientProject && activeClientProject.id === p.id ? 'selected' : ''}>${p.name}</option>`
  ).join('');

  if (clientProjects.length && !activeClientProject) {
    selectClientProject(clientProjects[0]);
    sel.value = clientProjects[0].id;
  }
}

function onProjectSelect() {
  const sel = document.getElementById('projSelector');
  const proj = clientProjects.find(p => p.id === sel.value);
  if (proj) selectClientProject(proj);
}

function showNewClientProject() {
  const el = document.getElementById('newProjFormWrap');
  if (el.innerHTML) { el.innerHTML = ''; return; }
  el.innerHTML = `<div style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;">
    <input type="text" id="newClientProjName" placeholder="Project name..." style="flex:1;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:8px 12px;border-radius:5px;outline:none;">
    <button onclick="createClientProject()" style="background:var(--accent);color:#050505;border:none;font-family:var(--font);font-weight:700;font-size:12px;padding:8px 16px;border-radius:5px;cursor:pointer;">Create</button>
    <button onclick="document.getElementById('newProjFormWrap').innerHTML=''" style="background:none;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);font-size:12px;padding:8px 12px;border-radius:5px;cursor:pointer;">Cancel</button>
  </div>`;
  document.getElementById('newClientProjName').focus();
}

async function createClientProject() {
  const name = document.getElementById('newClientProjName').value.trim();
  if (!name) return;
  const proj = { id: 'proj_' + Date.now(), partner_id: currentClient.id, name: name, status: 'active' };
  const { error } = await sb.from('projects').insert(proj);
  if (error) { console.error(error); toast('Error creating project'); return; }
  clientProjects.unshift(proj);
  document.getElementById('newProjFormWrap').innerHTML = '';
  document.getElementById('projCount').textContent = clientProjects.length;
  await loadClientProjects();
  selectClientProject(proj);
  document.getElementById('projSelector').value = proj.id;
  toast('Project created');
}

async function selectClientProject(proj) {
  activeClientProject = proj;
  document.getElementById('projLoading').style.display = 'none';
  const layout = document.getElementById('clientFeedLayout');
  layout.style.display = 'flex';
  document.getElementById('clientProjName').textContent = proj.name;
  document.getElementById('clientProjStatus').textContent = proj.status.toUpperCase();

  await Promise.all([loadClientFeed(proj.id), loadClientTasks(proj.id)]);
  renderClientFeed();
  renderClientTasks();
  subscribeClientProject(proj.id);
  document.getElementById('clientFileInput').onchange = handleClientFileSelect;
}

function subscribeClientProject(projectId) {
  if (clientProjChannel) sb.removeChannel(clientProjChannel);
  clientProjChannel = sb.channel(`portal-proj-${projectId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'feed_items', filter: `project_id=eq.${projectId}` }, async () => { await loadClientFeed(projectId); renderClientFeed(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks', filter: `project_id=eq.${projectId}` }, async () => { await loadClientTasks(projectId); renderClientTasks(); })
    .subscribe();
}

async function loadClientFeed(projectId) {
  const { data } = await sb.from('feed_items').select('*, feed_attachments(*)').eq('project_id', projectId).order('created_at', { ascending: true });
  clientFeed = data || [];
}

async function loadClientTasks(projectId) {
  const { data } = await sb.from('tasks').select('*').eq('project_id', projectId).order('created_at', { ascending: true });
  clientTasks = data || [];
}

function renderClientFeed() {
  const el = document.getElementById('clientFeedStream');
  if (!clientFeed.length) { el.innerHTML = '<div class="empty-state" style="padding:40px;">No updates yet.</div>'; return; }

  el.innerHTML = clientFeed.map(item => {
    const isAdmin = item.author_type === 'admin';
    const avatarClass = isAdmin ? 'admin' : 'client';
    const initials = item.author_name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const time = new Date(item.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

    // Use inline styles for avatar since portal doesn't have all admin CSS
    const avatarStyle = isAdmin
      ? 'background:rgba(168,255,0,.1);border-color:rgba(168,255,0,.2);color:#a8ff00;'
      : 'background:rgba(78,168,222,.1);border-color:rgba(78,168,222,.2);color:#4ea8de;';

    let attachHTML = '';
    if (item.feed_attachments && item.feed_attachments.length) {
      attachHTML = '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;">' + item.feed_attachments.map(a =>
        `<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);cursor:pointer;" onclick="dlFile('${a.file_path}','${a.file_name}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          ${a.file_name}
        </div>`
      ).join('') + '</div>';
    }

    let taskHTML = '';
    if (item.task_ids && item.task_ids.length) {
      const tasks = item.task_ids.map(tid => clientTasks.find(t => t.id === tid)).filter(Boolean);
      if (tasks.length) {
        taskHTML = '<div style="margin-top:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;">' + tasks.map(t => {
          const checkStyle = t.status === 'done' ? 'background:var(--accent);border-color:var(--accent);' : '';
          const checkMark = t.status === 'done' ? '✓' : '';
          return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;color:var(--text-dim);"><div style="width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;${checkStyle}"><span style="font-size:9px;color:#050505;font-weight:700;">${checkMark}</span></div> ${t.title}</div>`;
        }).join('') + '</div>';
      }
    }

    return `<div style="display:flex;gap:12px;">
      <div style="width:32px;height:32px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;${avatarStyle}">${initials}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:600;margin-bottom:2px;">${item.author_name} <span style="font-family:var(--mono);font-size:10px;color:var(--text-muted);font-weight:400;margin-left:8px;">${time}</span></div>
        <div style="font-size:13px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap;word-break:break-word;">${item.content || ''}</div>
        ${attachHTML}
        ${taskHTML}
      </div>
    </div>`;
  }).join('');

  el.scrollTop = el.scrollHeight;
}

function renderClientTasks() {
  const el = document.getElementById('clientTaskList');
  if (!clientTasks.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">No tasks yet.</div>'; renderClientProgress(); return; }

  const statusOrder = { in_progress: 0, review: 1, queued: 2, done: 3 };
  const sorted = [...clientTasks].sort((a, b) => (statusOrder[a.status] ?? 2) - (statusOrder[b.status] ?? 2));

  el.innerHTML = sorted.map(t => {
    const checkStyle = t.status === 'done' ? 'background:var(--accent);border-color:var(--accent);' : t.status === 'in_progress' ? 'border-color:var(--yellow);' : t.status === 'review' ? 'border-color:#4ea8de;' : '';
    const checkMark = t.status === 'done' ? '<span style="font-size:9px;color:#050505;font-weight:700;">✓</span>' : '';
    const titleStyle = t.status === 'done' ? 'color:var(--text-muted);text-decoration:line-through;' : '';
    const priColors = { urgent: 'background:rgba(255,68,68,.15);color:#ff4444;', high: 'background:rgba(255,180,40,.15);color:#ffb428;', med: 'background:rgba(78,168,222,.12);color:#4ea8de;', low: 'background:rgba(255,255,255,.04);color:var(--text-muted);' };
    const priStyle = priColors[t.priority] || '';
    const priLabel = t.priority ? t.priority.toUpperCase() : '';
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:12px;color:var(--text-dim);cursor:pointer;border-radius:4px;" onclick="cycleClientTask('${t.id}')">
      <div style="width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;${checkStyle}">${checkMark}</div>
      <span style="flex:1;${titleStyle}">${t.title}</span>
      ${priLabel ? `<span style="font-family:var(--mono);font-size:8px;letter-spacing:.5px;padding:1px 5px;border-radius:6px;${priStyle}">${priLabel}</span>` : ''}
    </div>`;
  }).join('');

  renderClientProgress();
}

function renderClientProgress() {
  const done = clientTasks.filter(t => t.status === 'done').length;
  const total = clientTasks.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('clientProgress').innerHTML = `
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);">Progress</div>
    <div style="height:4px;background:var(--surface-3);border-radius:2px;margin-top:6px;overflow:hidden;"><div style="height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:2px;width:${pct}%;transition:width .3s;"></div></div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:4px;">${done} of ${total} · ${pct}%</div>
  `;
}

async function cycleClientTask(taskId) {
  const t = clientTasks.find(x => x.id === taskId);
  if (!t) return;
  // Client can only move queued→in_progress or review→done, or toggle done→queued
  const cycle = { queued: 'in_progress', in_progress: 'review', review: 'done', done: 'queued' };
  const next = cycle[t.status] || 'queued';
  t.status = next;
  renderClientTasks();
  await sb.from('tasks').update({ status: next, updated_at: new Date().toISOString() }).eq('id', taskId);
}

function handleClientFileSelect(e) {
  clientPendingFiles.push(...Array.from(e.target.files));
  document.getElementById('clientStagedFiles').innerHTML = clientPendingFiles.map((f, i) =>
    `<div style="font-size:11px;font-family:var(--mono);background:var(--surface-2);border:1px solid var(--border);padding:3px 8px;border-radius:4px;color:var(--text-dim);display:inline-flex;align-items:center;gap:6px;">${f.name} <span style="cursor:pointer;color:var(--text-muted);font-size:14px;" onclick="clientPendingFiles.splice(${i},1);handleClientFileSelect({target:{files:[]}});">&times;</span></div>`
  ).join('');
  e.target.value = '';
}

async function postClientFeed() {
  if (!activeClientProject) return;
  const input = document.getElementById('clientFeedInput');
  const content = input.value.trim();
  if (!content && !clientPendingFiles.length) return;

  const feedId = 'feed_' + Date.now();
  const attachments = [];
  for (const file of clientPendingFiles) {
    const path = `${activeClientProject.id}/${crypto.randomUUID()}_${file.name}`;
    const { error } = await sb.storage.from('project-files').upload(path, file);
    if (!error) attachments.push({ id: 'att_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), feed_item_id: feedId, file_name: file.name, file_path: path, file_size: file.size, mime_type: file.type });
  }

  const { error } = await sb.from('feed_items').insert({
    id: feedId,
    project_id: activeClientProject.id,
    author_type: 'client',
    author_name: currentClient.contact_name || currentClient.company_name,
    content: content,
    task_ids: []
  });
  if (error) { console.error(error); toast('Error posting'); return; }
  if (attachments.length) await sb.from('feed_attachments').insert(attachments);

  input.value = '';
  clientPendingFiles = [];
  document.getElementById('clientStagedFiles').innerHTML = '';
  await loadClientFeed(activeClientProject.id);
  renderClientFeed();
  toast('Update posted');
}

async function dlFile(filePath, fileName) {
  const { data, error } = await sb.storage.from('project-files').createSignedUrl(filePath, 3600);
  if (error || !data) { toast('Error getting file'); return; }
  const a = document.createElement('a'); a.href = data.signedUrl; a.download = fileName; a.target = '_blank'; a.click();
}

function showClientTaskRequest() {
  const el = document.getElementById('clientTaskRequestWrap');
  if (el.innerHTML) { el.innerHTML = ''; return; }
  el.innerHTML = `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
    <input type="text" id="clientTaskTitle" placeholder="What do you need?" style="width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:7px 10px;border-radius:4px;outline:none;margin-bottom:6px;">
    <select id="clientTaskPriority" style="width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:12px;padding:7px 10px;border-radius:4px;outline:none;margin-bottom:6px;"><option value="low">Low</option><option value="med" selected>Medium</option><option value="high">High</option><option value="urgent">Urgent</option></select>
    <button onclick="submitClientTaskRequest()" style="width:100%;background:var(--accent);color:#050505;border:none;font-family:var(--font);font-weight:700;font-size:11px;padding:7px;border-radius:4px;cursor:pointer;">Submit Request</button>
  </div>`;
}

async function submitClientTaskRequest() {
  if (!activeClientProject) return;
  const title = document.getElementById('clientTaskTitle').value.trim();
  if (!title) return;
  const priority = document.getElementById('clientTaskPriority').value;
  const task = { id: 'task_' + Date.now(), project_id: activeClientProject.id, title: title, status: 'queued', priority: priority, created_by: 'client' };
  const { error } = await sb.from('tasks').insert(task);
  if (error) { console.error(error); toast('Error submitting request'); return; }
  clientTasks.push(task);
  renderClientTasks();
  document.getElementById('clientTaskRequestWrap').innerHTML = '';
  toast('Request submitted');
}

function toast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
</body>
</html>
